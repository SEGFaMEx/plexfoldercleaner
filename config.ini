[Settings]
# Pfade zu den zu überwachenden Ordnern (bitte anpassen!)
folder1 = F:\Filme
folder2 = F:\Serien

# Mindestgröße für Videodateien in GB (1GB = 1.0 / 200MB = 0.2)
min_video_size_gb = 0.2

# Zeitintervall zwischen den Scans in Minuten
check_interval_minutes = 60

# Video-Dateiendungen, die berücksichtigt werden sollen
video_extensions = .mkv, .mp4, .avi, .mov, .wmv, .m4v

# Sicherheitsmodus: true = nur anzeigen was gelöscht würde, false = tatsächlich löschen
dry_run = true

# Log-Datei aktivieren/deaktivieren (true/false)
enable_log_file = true

# Maximale Größe der Logdatei in MB (Standard 1.0)
# Es wird nur eine Datei vorgehalten; bei Erreichen des Limits wird sie überschrieben.
max_log_size_mb = 1.0
